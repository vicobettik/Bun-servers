<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Websockets Cliente</title>
    <link rel="icon" href="./favicon.ico" />
  </head>
  <body>
    <h1>Status</h1>
    <p id="status">Connecting</p>

    <button id="button-disconnect">Disconnect</button>
    <button id="button-connect">Connect</button>

    <form id="messageForm" style="display: none">
      <h1>Messages</h1>
      <input type="text" id="input-message" placeholder="Message" />
      <button id="send">Send</button>
    </form>

    <ul id="messages"></ul>

    <script>
      // crear cookies

      const session = {
        id:1,
        session: 'Abc123'
      };

      const jwtToken = 'MiToken-JWT';

      document.cookie = `session=${JSON.stringify(session)}`;
      document.cookie = `X-Token=${jwtToken}`;


      let socket;
      const status = document.querySelector("#status");
      const messageForm = document.querySelector("#messageForm");
      const messageInput = document.querySelector("#input-message");
      const messagesContainer = document.querySelector("#messages");

      const btnDisconnect = document.querySelector("#button-disconnect");
      const btnConnect = document.querySelector("#button-connect");

      //   console.log({ status, messageForm, messageInput, messagesContainer ,btnDisconnect, btnConnect });

      const createWebsocket = () => {
        const channelId = "mi-canal-personalizado";

        let socket = new WebSocket(
          `ws://localhost:3100?channelId=${channelId}`,
        );
        socket.onopen = () => {
          console.log("Websocket conectado");
          messageForm.style.display = "block";
          status.textContent = "Conectado";
        };

        socket.onclose = () => {
          console.log("Websocket desconectado");
          messageForm.style.display = "none";
          status.textContent = "Desconectado";
        };

        socket.onerror = (event) => {
          console.log({ error: event });
        };

        socket.onmessage = (event) => {
          console.log(event.data);
          showMessage(event.data);
        };

        return socket;
      };

      socket = createWebsocket();

      btnDisconnect.addEventListener("click", () => {
        if (socket.readyState != WebSocket.OPEN) {
          return;
        }
        socket.close();
        status.textContent = "Desconectado";
      });

      btnDisconnect.addEventListener("click", () => {
        if (socket.readyState != WebSocket.OPEN) {
          return;
        }
        socket.close();
        status.textContent = "Desconectado";
        messageForm.style.display = "none";
      });

      btnConnect.addEventListener("click", () => {
        if (socket.readyState == WebSocket.OPEN) {
          return;
        }
        socket = createWebsocket();
        status.textContent = "Conectado";
        messageForm.style.display = "block";
      });

      messageForm.addEventListener("submit", (event) => {
        event.preventDefault();
        if (!messageInput.value && messageInput.value.length == 0) {
          return;
        }
        socket.send(messageInput.value);
        messageInput.value = "";
      });

      const showMessage = (message) => {
        const li = document.createElement("li");
        li.textContent = message;

        messagesContainer.appendChild(li);
      };
    </script>
  </body>
</html>
